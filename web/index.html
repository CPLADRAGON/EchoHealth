<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f5f5f7" />
<title>EchoHealth · 回声健康</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon-32.png" sizes="32x32" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script>
  // Set the theme before first paint to avoid a flash of the wrong mode.
  (function(){
    try{
      var th = localStorage.getItem("ah_theme");
      if (!th) th = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", th);
      document.documentElement.style.colorScheme = th;
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://cdn.plot.ly" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
<!-- Plotly is loaded on demand (only once a file is parsed) to keep the
     initial page weight tiny — see loadPlotly() below. -->
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<style>
  :root{
    --accent:#fa3c4c; --blue:#2e7fff; --green:#34c759; --purple:#8a5cf6; --orange:#ff9f0a;
    --grid:#e9edf2; --ink:#1d1d1f; --muted:#6e6e73;
    --parchment:#f5f5f7; --hairline:rgba(0,0,0,.10); --canvas:#fff;
    --accent-soft:rgba(250,60,76,.07); --map-bg:#eef1f4;
    --chart-bg:#ffffff; --chart-grid:#e9edf2; --chart-ink:#1d1d1f;
    --code-bg:rgba(0,0,0,.06);
  }
  [data-theme="dark"]{
    --grid:#2c2c2e; --ink:#f2f2f7; --muted:#9a9aa2;
    --parchment:#000000; --hairline:rgba(255,255,255,.14); --canvas:#1c1c1e;
    --accent-soft:rgba(250,60,76,.16); --map-bg:#2c2c2e;
    --chart-bg:#1c1c1e; --chart-grid:#2c2c2e; --chart-ink:#f2f2f7;
    --code-bg:rgba(255,255,255,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--parchment); color:var(--ink);
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    line-height:1.5; overflow-x:hidden;
  }
  /* prevent the 300ms tap delay and intentional tap highlight on touch */
  button,a,select,.drop,.ai-chip{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  /* visible keyboard focus for every interactive control */
  a:focus-visible,button:focus-visible,select:focus-visible,textarea:focus-visible,
  [tabindex]:focus-visible{
    outline:2px solid var(--blue);outline-offset:2px;border-radius:8px;
  }
  /* respect users who prefer less motion */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  }
  .wrap{max-width:1200px;margin:0 auto;padding:0 28px}

  /* ---- header ---- */
  header{
    background:var(--canvas); border-bottom:1px solid var(--hairline);
    padding:30px 0 26px;
  }
  .head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
  header h1{margin:0;font-size:32px;font-weight:600;letter-spacing:-.6px}
  header p{margin:8px 0 0;font-size:16px;color:var(--muted);max-width:640px}
  .head-actions{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .howlink{
    background:none;border:none;color:var(--blue);font-size:14px;cursor:pointer;
    padding:8px 4px;font-family:inherit;
  }
  .howlink:hover{text-decoration:underline}
  /* theme toggle */
  .theme-btn{
    display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;
    border:1px solid var(--hairline);border-radius:9999px;background:var(--canvas);
    color:var(--ink);cursor:pointer;padding:0;font-family:inherit;
  }
  .theme-btn:hover{border-color:var(--accent)}
  .theme-btn svg{width:18px;height:18px;display:block}
  /* language segmented control */
  .lang{display:inline-flex;border:1px solid var(--hairline);border-radius:9999px;overflow:hidden;background:var(--canvas)}
  .lang button{
    border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;
    padding:7px 14px;cursor:pointer;color:var(--muted);
  }
  .lang button.active{background:var(--ink);color:var(--canvas)}

  /* ---- privacy strip ---- */
  .privacy-strip{
    background:var(--canvas);border-bottom:1px solid var(--hairline);
    font-size:13px;color:var(--muted);padding:10px 0;
  }
  .privacy-strip b{color:var(--ink);font-weight:600}

  /* ---- dropzone ---- */
  .stage{padding:44px 0 60px}
  .drop{
    background:var(--canvas);border:1.5px dashed var(--hairline);border-radius:18px;
    padding:54px 28px;text-align:center;transition:border-color .15s,background .15s;cursor:pointer;
  }
  .drop.drag{border-color:var(--accent);background:var(--accent-soft)}
  .drop h2{margin:0 0 8px;font-size:21px;font-weight:600;letter-spacing:-.3px}
  .drop p{margin:0 auto;max-width:460px;color:var(--muted);font-size:15px}
  .drop .btn{
    display:inline-block;margin-top:22px;background:var(--ink);color:var(--canvas);border:none;
    border-radius:9999px;padding:12px 26px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;
  }
  .drop .formats{margin-top:16px;font-size:12.5px;color:var(--muted)}
  input[type=file]{display:none}

  /* ---- install reminder ---- */
  .installbar{
    display:flex;align-items:center;gap:12px;
    background:var(--canvas);border:1px solid var(--hairline);border-radius:14px;
    padding:12px 12px 12px 16px;margin-bottom:20px;
  }
  .install-ico{display:inline-flex;color:var(--accent);flex-shrink:0}
  .install-ico svg{width:20px;height:20px;display:block}
  .install-msg{flex:1;min-width:0;font-size:13.5px;line-height:1.5;color:var(--ink)}
  .install-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .install-go{
    background:var(--ink);color:var(--canvas);border:none;border-radius:9999px;
    font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;white-space:nowrap;
  }
  .install-go:hover{opacity:.88}
  .install-x{
    background:none;border:none;color:var(--muted);font-size:20px;line-height:1;
    cursor:pointer;padding:0 6px;font-family:inherit;border-radius:6px;
  }
  .install-x:hover{color:var(--ink)}

  /* ---- error banner ---- */
  .errbar{
    display:flex;align-items:flex-start;gap:12px;
    background:var(--accent-soft);border:1px solid rgba(250,60,76,.35);border-radius:14px;
    padding:13px 14px 13px 16px;margin-bottom:20px;
  }
  .errbar-msg{flex:1;min-width:0;font-size:14px;line-height:1.5;color:var(--ink);word-wrap:break-word}
  .errbar-x{
    flex-shrink:0;background:none;border:none;color:var(--muted);font-size:20px;line-height:1;
    cursor:pointer;padding:0 4px;font-family:inherit;border-radius:6px;
  }
  .errbar-x:hover{color:var(--ink)}

  /* ---- loading ---- */
  .loading{display:none;text-align:center;padding:60px 0}
  .loading.show{display:block}
  .spinner{
    width:34px;height:34px;border-radius:50%;border:3px solid var(--grid);
    border-top-color:var(--accent);animation:spin 1s linear infinite;margin:0 auto 18px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading p{color:var(--muted);font-size:15px;margin:4px 0}
  .loading .big{color:var(--ink);font-size:17px;font-weight:600}

  /* ---- results ---- */
  .results{display:none}
  .results.show{display:block}
  .results-bar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:24px 0 0}
  .results-actions{display:flex;gap:10px;flex-wrap:wrap}
  .period-wrap{display:inline-flex;align-items:center;gap:8px}
  .period-lab{font-size:13px;color:var(--muted);font-weight:500}
  #periodPick{
    font-family:inherit;font-size:13px;color:var(--ink);background-color:var(--canvas);
    border:1px solid var(--hairline);border-radius:9999px;padding:9px 14px;cursor:pointer;
  }
  #periodPick:hover{border-color:var(--accent)}
  .exp-btn{
    display:inline-flex;align-items:center;gap:7px;background:var(--canvas);border:1px solid var(--hairline);
    border-radius:9999px;color:var(--ink);font-family:inherit;font-size:13px;font-weight:500;
    padding:9px 16px;cursor:pointer;
  }
  .exp-btn:hover{border-color:var(--accent)}
  .exp-btn:disabled{opacity:.55;cursor:default}
  .exp-btn.primary{background:var(--ink);color:var(--canvas);border-color:var(--ink)}
  .exp-btn.primary:hover{opacity:.88;border-color:var(--ink)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:30px 0 8px}
  .kpi{background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:18px 18px 16px}
  .kpi-lab{font-size:12.5px;color:var(--muted);font-weight:500}
  .kpi-val{font-size:26px;font-weight:600;letter-spacing:-.4px;margin-top:6px;font-variant-numeric:tabular-nums}
  .kpi-sub{font-size:12px;color:var(--muted);margin-top:2px}

  /* ---- streaks & records ---- */
  .records{margin:26px 0 0}
  .records h3{margin:0 0 12px;font-size:17px;font-weight:600;letter-spacing:-.2px}
  .rec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
  .rec{
    background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:16px 18px;
    display:flex;flex-direction:column;gap:2px;
  }
  .rec-lab{font-size:12.5px;color:var(--muted);font-weight:500}
  .rec-val{font-size:24px;font-weight:600;letter-spacing:-.4px;font-variant-numeric:tabular-nums}
  .rec-sub{font-size:12px;color:var(--muted)}

  /* ---- patterns / correlations ---- */
  .patterns{margin:26px 0 0}
  .patterns h3{margin:0 0 2px;font-size:17px;font-weight:600;letter-spacing:-.2px}
  .corr-sub{margin:0 0 14px;font-size:13px;color:var(--muted)}
  .corr-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .corr{
    background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:16px 18px;
    display:flex;flex-direction:column;gap:8px;
  }
  .corr-text{font-size:14px;line-height:1.55;color:var(--ink)}
  .corr-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .corr-bar{flex:1;height:6px;border-radius:9999px;background:var(--grid);overflow:hidden;min-width:60px}
  .corr-bar i{display:block;height:100%;border-radius:9999px;background:var(--accent)}
  .corr-r{font-variant-numeric:tabular-nums;white-space:nowrap}
  .corr-chartcard{margin-top:16px}
  .corr-foot{margin:14px 2px 0;font-size:12px;line-height:1.6;color:var(--muted)}

  section.charts{padding:18px 0 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(460px,1fr));gap:20px}
  .card{background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:18px 18px 8px;min-width:0}
  .card h3{margin:0 0 2px;font-size:17px;font-weight:600;letter-spacing:-.2px}
  .card .csub{margin:0 0 8px;font-size:13px;color:var(--muted)}
  .plotwrap{width:100%;max-width:100%}
  .insight{
    margin:8px 2px 10px;padding-top:10px;border-top:1px solid var(--hairline);
    font-size:13px;line-height:1.6;color:var(--ink);
  }

  /* ---- routes map ---- */
  .mapsec{margin-top:24px}
  .mapsec.card{padding:18px}
  .map-head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}
  .map-head .map-titles h3{margin:0 0 2px;font-size:17px;font-weight:600;letter-spacing:-.2px}
  .map-head .map-titles p{margin:0;font-size:13px;color:var(--muted)}
  #routePick{
    font-family:inherit;font-size:13px;color:var(--ink);background-color:var(--canvas);
    border:1px solid var(--hairline);border-radius:9999px;padding:8px 14px;cursor:pointer;max-width:260px;
  }
  #routeMap{width:100%;height:420px;border-radius:14px;overflow:hidden;background:var(--map-bg)}
  .map-foot{margin:10px 2px 0;font-size:12px;line-height:1.6;color:var(--muted)}
  .map-hint{
    display:flex;align-items:center;justify-content:center;min-height:140px;text-align:center;
    font-size:14px;line-height:1.6;color:var(--muted);padding:8px;
  }
  .leaflet-container{font-family:inherit}

  .reset{
    background:none;border:1px solid var(--hairline);border-radius:9999px;color:var(--ink);
    font-family:inherit;font-size:13px;padding:8px 18px;cursor:pointer;margin:26px 0 0;
  }

  /* ---- AI assistant ---- */
  .ai{
    background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;
    padding:20px 20px 18px;margin-top:24px;
  }
  .ai-head h3{margin:0;font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--ink)}
  .ai-disc{margin:4px 0 0;font-size:12px;color:var(--muted)}
  .ai-log{
    margin:16px 0 0;max-height:380px;overflow-y:auto;overscroll-behavior:contain;display:flex;flex-direction:column;gap:10px;
  }
  .ai-msg{font-size:14px;line-height:1.6;padding:10px 13px;border-radius:14px;max-width:88%;white-space:pre-wrap;word-wrap:break-word}
  .ai-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
  .ai-msg.bot{align-self:flex-start;background:var(--parchment);color:var(--ink);border-bottom-left-radius:5px}
  .ai-msg.bot.err{background:var(--accent-soft);color:var(--accent);border:1px solid var(--hairline)}
  .ai-msg.bot p{margin:0 0 6px}
  .ai-msg.bot ul{margin:6px 0;padding-left:20px}
  .ai-msg.bot li{margin:2px 0}
  .ai-msg.bot code{background:var(--code-bg);border-radius:4px;padding:1px 5px;font-size:12.5px}
  .ai-msg.bot strong{font-weight:600}
  .ai-chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 0}
  .ai-chip{
    background:var(--parchment);border:1px solid var(--hairline);border-radius:9999px;
    color:var(--ink);font-family:inherit;font-size:12.5px;padding:7px 13px;cursor:pointer;
  }
  .ai-chip:hover{border-color:var(--accent)}
  .ai-input{display:flex;gap:10px;margin-top:14px;align-items:flex-end}
  .ai-input textarea{
    flex:1;resize:none;font-family:inherit;font-size:14px;line-height:1.5;color:var(--ink);
    background:var(--canvas);border:1px solid var(--hairline);border-radius:14px;padding:11px 14px;
    max-height:140px;overflow-y:auto;
  }
  .ai-input textarea:focus{outline:none;border-color:var(--accent)}
  .ai-input button{
    background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:inherit;
    font-size:14px;font-weight:500;padding:11px 20px;cursor:pointer;white-space:nowrap;
  }
  .ai-input button:disabled{opacity:.5;cursor:default}
  @media(max-width:560px){
    .ai-msg{max-width:94%}
    .ai-input button{padding:11px 16px}
  }

  footer{padding:34px 0 50px;color:var(--muted);font-size:13px;text-align:center}

  /* ---- modal ---- */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.36);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:50;
  }
  .overlay.show{display:flex}
  .modal{
    background:var(--canvas);border-radius:20px;max-width:560px;width:100%;
    max-height:88vh;overflow:auto;overscroll-behavior:contain;padding:34px 34px 28px;border:1px solid var(--hairline);
  }
  .modal h2{margin:0 0 4px;font-size:24px;font-weight:600;letter-spacing:-.4px}
  .modal .lede{margin:0 0 22px;color:var(--muted);font-size:15px}
  .badge{
    display:inline-flex;align-items:center;gap:7px;background:var(--parchment);
    border:1px solid var(--hairline);border-radius:9999px;padding:6px 14px;font-size:12.5px;
    color:var(--ink);font-weight:500;margin-bottom:18px;
  }
  .badge .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .block-title{font-size:15px;font-weight:600;margin:18px 0 8px}
  .privacy-body{font-size:14px;color:var(--muted);background:var(--parchment);border-left:3px solid var(--accent);border-radius:8px;padding:14px 16px}
  ol.steps{margin:0;padding-left:0;list-style:none;counter-reset:s}
  ol.steps li{
    counter-increment:s;position:relative;padding:0 0 14px 40px;font-size:14px;color:var(--ink);
  }
  ol.steps li::before{
    content:counter(s);position:absolute;left:0;top:-2px;width:26px;height:26px;border-radius:50%;
    background:var(--ink);color:var(--canvas);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;
  }
  ol.steps li b{font-weight:600}
  .modal .gotit{
    margin-top:24px;width:100%;background:var(--ink);color:var(--canvas);border:none;border-radius:12px;
    padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
  }

  /* ---- report preview modal ---- */
  .modal.preview{max-width:760px;display:flex;flex-direction:column;padding:0}
  .pv-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 22px;border-bottom:1px solid var(--hairline);flex-shrink:0;
  }
  .pv-head h2{margin:0;font-size:18px;font-weight:600;letter-spacing:-.2px}
  .pv-x{
    background:none;border:none;color:var(--muted);font-size:24px;line-height:1;
    cursor:pointer;padding:2px 8px;font-family:inherit;border-radius:8px;
  }
  .pv-x:hover{color:var(--ink);background:var(--parchment)}
  .pv-body{overflow:auto;overscroll-behavior:contain;background:var(--parchment);padding:18px;flex:1;min-height:0;text-align:center}
  .pv-body img{display:block;width:100%;height:auto;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,.12)}
  .pv-foot{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;
    padding:14px 22px;border-top:1px solid var(--hairline);flex-shrink:0;
  }
  .pv-hint{font-size:12.5px;color:var(--muted);flex:1;min-width:0}
  .pv-save{
    background:var(--ink);color:var(--canvas);border:none;border-radius:12px;font-family:inherit;
    font-size:14px;font-weight:600;padding:11px 22px;cursor:pointer;white-space:nowrap;
  }
  .pv-save:hover{opacity:.88}

  @media (max-width:560px){
    .wrap{padding:0 18px}
    header h1{font-size:26px}
    .grid{grid-template-columns:1fr}
    .modal{padding:26px 22px 22px}
    .modal.preview{padding:0;max-height:92vh}
  }
</style>
</head>
<body>

<!-- ===== onboarding / how-it-works modal ===== -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="onbTitle">
    <span class="badge"><span class="dot" aria-hidden="true"></span><span data-i="onb.badge"></span></span>
    <h2 id="onbTitle" data-i="onb.title"></h2>
    <p class="lede" data-i="onb.lede"></p>

    <div class="block-title" data-i="onb.privacyTitle"></div>
    <div class="privacy-body" data-i="onb.privacyBody"></div>

    <div class="block-title" data-i="onb.howTitle"></div>
    <ol class="steps" id="stepsList"></ol>

    <button class="gotit" id="gotitBtn" data-i="onb.gotIt"></button>
  </div>
</div>

<!-- ===== report preview modal ===== -->
<div class="overlay" id="pvOverlay">
  <div class="modal preview" role="dialog" aria-modal="true" aria-labelledby="pvTitle">
    <div class="pv-head">
      <h2 id="pvTitle" data-i="report.previewTitle"></h2>
      <button class="pv-x" id="pvClose" aria-label="Close">×</button>
    </div>
    <div class="pv-body" id="pvBody"></div>
    <div class="pv-foot">
      <span class="pv-hint" id="pvHint"></span>
      <button class="pv-save" id="pvSave"></button>
    </div>
  </div>
</div>

<header>
  <div class="wrap head-row">
    <div>
      <h1 data-i="app.title"></h1>
      <p data-i="app.subtitle"></p>
    </div>
    <div class="head-actions">
      <button class="howlink" id="howBtn" data-i="nav.how"></button>
      <button class="theme-btn" id="themeBtn" type="button" aria-label="Toggle dark mode"></button>
      <div class="lang" role="group" aria-label="Language">
        <button data-lang="en" translate="no">EN</button>
        <button data-lang="zh" translate="no">中文</button>
      </div>
    </div>
  </div>
</header>

<div class="privacy-strip">
  <div class="wrap"><span data-i="privacy.strip"></span></div>
</div>

<main class="wrap stage">
  <!-- install reminder (PWA) -->
  <div class="installbar" id="installBar" style="display:none">

    </span>
  </div>

  <!-- error banner -->
  <div class="errbar" id="errBar" role="alert" aria-live="assertive" style="display:none">
    <span class="errbar-msg" id="errMsg"></span>
    <button class="errbar-x" id="errClose" aria-label="Dismiss">×</button>
  </div>

  <!-- dropzone -->
  <div class="drop" id="drop">
    <h2 data-i="drop.title"></h2>
    <p data-i="drop.hint"></p>
    <button class="btn" id="pickBtn" data-i="drop.button"></button>
    <div class="formats" data-i="drop.formats"></div>
    <input type="file" id="fileInput" accept=".xml,.zip" />
  </div>

  <!-- loading -->
  <div class="loading" id="loading" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p class="big" id="loadBig"></p>
    <p id="loadSmall"></p>
  </div>

  <!-- results -->
  <div class="results" id="results">
    <div class="results-bar">
      <span class="period-wrap" id="periodWrap" style="display:none">
        <label class="period-lab" for="periodPick" data-i="filter.period"></label>
        <select id="periodPick"></select>
      </span>
      <span class="results-actions">
        <button class="exp-btn primary" id="saveCard" data-i="card.save"></button>
        <button class="exp-btn" id="savePng" data-i="report.savePng"></button>
        <button class="exp-btn" id="savePdf" data-i="report.savePdf"></button>
      </span>
    </div>
    <div class="kpis" id="kpis"></div>
    <section class="records" id="recordsSec" style="display:none">
      <h3 data-i="rec.title"></h3>
      <div class="rec-grid" id="recGrid"></div>
    </section>
    <section class="charts">
      <div class="grid" id="chartGrid"></div>
    </section>

    <!-- patterns / correlations -->
    <section class="patterns" id="patternsSec" style="display:none">
      <h3 data-i="corr.title"></h3>
      <p class="corr-sub" data-i="corr.sub"></p>
      <div class="corr-list" id="corrList"></div>
      <div class="card corr-chartcard" id="corrChartCard" style="display:none">
        <h3 data-i="corr.chartTitle"></h3>
        <p class="csub" id="corrChartSub"></p>
        <div class="plotwrap" id="corrChart"></div>
      </div>
      <p class="corr-foot" data-i="corr.disclaimer"></p>
    </section>

    <!-- routes map -->
    <section class="mapsec card" id="mapSec" style="display:none">
      <div class="map-head">
        <div class="map-titles">
          <h3 data-i="map.title"></h3>
          <p data-i="map.sub"></p>
        </div>
        <select id="routePick" aria-label="route"></select>
      </div>
      <div id="routeMap"></div>
      <div class="map-hint" id="mapHint" style="display:none"></div>
      <p class="map-foot" data-i="map.privacy"></p>
    </section>

    <!-- AI assistant -->
    <section class="ai" id="aiPanel">
      <div class="ai-head">
        <h3 data-i="ai.title"></h3>
        <p class="ai-disc" data-i="ai.disclaimer"></p>
      </div>
      <div class="ai-log" id="aiLog"></div>
      <div class="ai-chips" id="aiChips"></div>
      <div class="ai-input">
        <textarea id="aiText" rows="1" data-i-ph="ai.placeholder"></textarea>
        <button id="aiSend" data-i="ai.send"></button>
      </div>
    </section>

    <button class="reset" id="resetBtn" data-i="results.reset"></button>
  </div>
</main>

<footer>
  <div class="wrap" data-i="footer.text"></div>
</footer>

  bar.style.display = "";

  if (remember) localStorage.setItem("ah_install_dismissed", "1");

/* =====================================================================
   pure-JavaScript streaming parser

   Replaces the former Pyodide/Python pipeline. The export can be hundreds
   of MB (a multi-year iPhone export is ~800MB), which made iOS Safari run
   out of memory while booting the Python WASM runtime and copying the whole
   file into it. This parser streams the file in ~1MB chunks, scans complete
   <Record>/<Workout> opening tags, aggregates, and discards processed text,
   so peak memory stays tiny regardless of file size. .zip exports are
   decompressed on the fly with fflate's streaming Unzip.
   ===================================================================== */
const SUM_TYPES = {
  "HKQuantityTypeIdentifierStepCount": "steps",
  "HKQuantityTypeIdentifierDistanceWalkingRunning": "distance",
  "HKQuantityTypeIdentifierActiveEnergyBurned": "energy",
  "HKQuantityTypeIdentifierFlightsClimbed": "flights",
};
const RHR_TYPE = "HKQuantityTypeIdentifierRestingHeartRate";
const HRV_TYPE = "HKQuantityTypeIdentifierHeartRateVariabilitySDNN";
const SLEEP_TYPE = "HKCategoryTypeIdentifierSleepAnalysis";
const WEIGHT_TYPE = "HKQuantityTypeIdentifierBodyMass";
const VO2_TYPE = "HKQuantityTypeIdentifierVO2Max";
const BP_SYS_TYPE = "HKQuantityTypeIdentifierBloodPressureSystolic";
const BP_DIA_TYPE = "HKQuantityTypeIdentifierBloodPressureDiastolic";

// Matches an opening <Record ...> or <Workout ...> tag. The [\s/>] guard
// after the name avoids matching siblings like <WorkoutEvent>/<WorkoutStatistics>.
const TAG_RE = /<(?:Record|Workout)[\s/>][^>]*>/g;
const RE_TYPE  = /\btype="([^"]*)"/;
const RE_START = /\bstartDate="([^"]*)"/;
const RE_END   = /\bendDate="([^"]*)"/;
const RE_VALUE = /\bvalue="([^"]*)"/;
const RE_UNIT  = /\bunit="([^"]*)"/;
function av(tag, re){ const m = re.exec(tag); return m ? m[1] : null; }

// "YYYY-MM-DD HH:MM:SS ..." -> epoch ms, ignoring the timezone suffix.
// Both start and end carry the same offset, so durations are correct.
function naiveMs(s){
  return Date.UTC(+s.slice(0,4), +s.slice(5,7)-1, +s.slice(8,10),
                  +s.slice(11,13), +s.slice(14,16), +s.slice(17,19));
}
function newAgg(){
  return {
    day_steps: new Map(), day_dist: new Map(),
    day_energy: new Map(), day_flights: new Map(),
    rhr: new Map(), hrv: new Map(), sleep_night: new Map(),
    sleep_stage: new Map(), sleep_bound: new Map(),
    weight: new Map(), vo2: new Map(), bp_sys: new Map(), bp_dia: new Map(),
    weight_unit: null, sex: null, meScanned: false,
    workouts_month: new Map(), workout_total: 0, rec: 0,
    dmin: null, dmax: null,
  };
}
function pushList(map, k, v){ const a = map.get(k); if (a) a.push(v); else map.set(k, [v]); }

// The <Me ...> element (once, near the top of export.xml) carries biological
// sex, which lets us pick the right VO2max→fitness-age curve. Best-effort.
const ME_RE = /<Me\b[^>]*>/;
function scanMe(A, text){
  if (A.meScanned) return;
  const m = ME_RE.exec(text);
  if (!m) return;
  A.meScanned = true;
  const s = /HKCharacteristicTypeIdentifierBiologicalSex="([^"]*)"/.exec(m[0]);
  if (s){
    if (/Male/i.test(s[1])) A.sex = "male";
    else if (/Female/i.test(s[1])) A.sex = "female";
  }
}

function handleTag(A, tag){
  if (tag.charCodeAt(1) === 87 /* 'W' -> Workout */){
    const start = av(tag, RE_START);
    if (start){
      const mo = start.slice(0,7);
      A.workouts_month.set(mo, (A.workouts_month.get(mo) || 0) + 1);
      A.workout_total++;
    }
    return;
  }
  A.rec++;
  const rtype = av(tag, RE_TYPE);
  const start = av(tag, RE_START);
  const day = start ? start.slice(0,10) : null;
  if (day){
    if (A.dmin === null || day < A.dmin) A.dmin = day;
    if (A.dmax === null || day > A.dmax) A.dmax = day;
  }
  const col = SUM_TYPES[rtype];
  if (col && day){
    const v = parseFloat(av(tag, RE_VALUE));
    if (!isNaN(v)){
      if (col === "steps") A.day_steps.set(day, (A.day_steps.get(day) || 0) + v);
      else if (col === "distance") A.day_dist.set(day, (A.day_dist.get(day) || 0) + v);
      else if (col === "energy") A.day_energy.set(day, (A.day_energy.get(day) || 0) + v);
      else if (col === "flights") A.day_flights.set(day, (A.day_flights.get(day) || 0) + v);
    }
  } else if (rtype === RHR_TYPE && day){
    const v = parseFloat(av(tag, RE_VALUE)); if (!isNaN(v)) pushList(A.rhr, day, v);
  } else if (rtype === HRV_TYPE && day){
    const v = parseFloat(av(tag, RE_VALUE)); if (!isNaN(v)) pushList(A.hrv, day, v);
  } else if (rtype === WEIGHT_TYPE && day){
    const v = parseFloat(av(tag, RE_VALUE));
    if (!isNaN(v)){ pushList(A.weight, day, v); if (!A.weight_unit) A.weight_unit = av(tag, RE_UNIT); }
  } else if (rtype === VO2_TYPE && day){
    const v = parseFloat(av(tag, RE_VALUE)); if (!isNaN(v)) pushList(A.vo2, day, v);
  } else if (rtype === BP_SYS_TYPE && day){
    const v = parseFloat(av(tag, RE_VALUE)); if (!isNaN(v)) pushList(A.bp_sys, day, v);
  } else if (rtype === BP_DIA_TYPE && day){
    const v = parseFloat(av(tag, RE_VALUE)); if (!isNaN(v)) pushList(A.bp_dia, day, v);
  } else if (rtype === SLEEP_TYPE){
    const val = av(tag, RE_VALUE) || "";
    if (val.indexOf("Asleep") !== -1){
      const s = av(tag, RE_START), e = av(tag, RE_END);
      if (s && e){
        const hrs = (naiveMs(e) - naiveMs(s)) / 3600000;
        if (hrs > 0 && hrs < 24){
          const night = e.slice(0,10);
          A.sleep_night.set(night, (A.sleep_night.get(night) || 0) + hrs);
          // per-stage hours (newer exports split sleep into Core/Deep/REM)
          let st = "unspec";
          if (val.indexOf("Core") !== -1) st = "core";
          else if (val.indexOf("Deep") !== -1) st = "deep";
          else if (val.indexOf("REM") !== -1) st = "rem";
          let sg = A.sleep_stage.get(night);
          if (!sg){ sg = {core:0, deep:0, rem:0, unspec:0}; A.sleep_stage.set(night, sg); }
          sg[st] += hrs;
          // earliest onset / latest wake clock times for the consistency score
          const onMs = naiveMs(s), wkMs = naiveMs(e);
          const onClk = (+s.slice(11,13))*60 + (+s.slice(14,16));
          const wkClk = (+e.slice(11,13))*60 + (+e.slice(14,16));
          let bd = A.sleep_bound.get(night);
          if (!bd){ A.sleep_bound.set(night, {onMs, onClk, wkMs, wkClk}); }
          else {
            if (onMs < bd.onMs){ bd.onMs = onMs; bd.onClk = onClk; }
            if (wkMs > bd.wkMs){ bd.wkMs = wkMs; bd.wkClk = wkClk; }
          }
        }
      }
    }
  }
}

function finalize(A){
  const sdays = [...A.day_steps.keys()].sort();
  const svals = sdays.map(d => Math.round(A.day_steps.get(d)));
  const roll = []; const win = []; let s = 0;
  for (const v of svals){
    win.push(v); s += v;
    if (win.length > 30) s -= win.shift();
    roll.push(Math.round(s / win.length));
  }
  const mdist = new Map();
  for (const [d, v] of A.day_dist){ const m = d.slice(0,7); mdist.set(m, (mdist.get(m) || 0) + v); }
  const md_x = [...mdist.keys()].sort();
  const md_y = md_x.map(m => Math.round(mdist.get(m) * 10) / 10);

  const avg = a => a.reduce((p,c)=>p+c,0) / a.length;
  const rhr_x = [...A.rhr.keys()].sort();
  const rhr_y = rhr_x.map(d => Math.round(avg(A.rhr.get(d))));
  const hrv_x = [...A.hrv.keys()].sort();
  const hrv_y = hrv_x.map(d => Math.round(avg(A.hrv.get(d)) * 10) / 10);
  const sl_x = [...A.sleep_night.keys()].sort();
  const sl_y = sl_x.map(d => Math.round(A.sleep_night.get(d) * 100) / 100);
  // per-stage hours, aligned with sl_x (only meaningful when stages exist)
  let hasStages = false;
  const st_core=[], st_deep=[], st_rem=[], st_unspec=[];
  for (const d of sl_x){
    const sg = A.sleep_stage.get(d) || {core:0,deep:0,rem:0,unspec:0};
    if (sg.core || sg.deep || sg.rem) hasStages = true;
    st_core.push(Math.round(sg.core*100)/100);
    st_deep.push(Math.round(sg.deep*100)/100);
    st_rem.push(Math.round(sg.rem*100)/100);
    st_unspec.push(Math.round(sg.unspec*100)/100);
  }
  // bed/wake clock times for the consistency score
  const clk_on=[], clk_wk=[];
  for (const d of sl_x){ const bd = A.sleep_bound.get(d); if (bd){ clk_on.push(bd.onClk); clk_wk.push(bd.wkClk); } }
  const sleep_consistency = _sleepConsistency(clk_on, clk_wk);

  const wm_x = [...A.workouts_month.keys()].sort();
  const wm_y = wm_x.map(m => A.workouts_month.get(m));

  // weight + VO2 max: per-day averages (line series)
  const wt_x = [...A.weight.keys()].sort();
  const wt_y = wt_x.map(d => Math.round(avg(A.weight.get(d)) * 10) / 10);
  const vo_x = [...A.vo2.keys()].sort();
  const vo_y = vo_x.map(d => Math.round(avg(A.vo2.get(d)) * 10) / 10);

  // blood pressure: per-day averages, aligned on days that have both readings
  const bp_x = [], bp_sys = [], bp_dia = [];
  for (const d of [...A.bp_sys.keys()].sort()){
    if (A.bp_dia.has(d)){
      bp_x.push(d);
      bp_sys.push(Math.round(avg(A.bp_sys.get(d))));
      bp_dia.push(Math.round(avg(A.bp_dia.get(d))));
    }
  }

  // flights climbed + active energy: monthly sums (bar series)
  const fmon = new Map();
  for (const [d, v] of A.day_flights){ const m = d.slice(0,7); fmon.set(m, (fmon.get(m) || 0) + v); }
  const fl_x = [...fmon.keys()].sort();
  const fl_y = fl_x.map(m => Math.round(fmon.get(m)));
  const emon = new Map();
  for (const [d, v] of A.day_energy){ const m = d.slice(0,7); emon.set(m, (emon.get(m) || 0) + v); }
  const en_x = [...emon.keys()].sort();
  const en_y = en_x.map(m => Math.round(emon.get(m)));

  let totalSteps = 0; for (const v of A.day_steps.values()) totalSteps += v;
  let totalDist = 0;  for (const v of A.day_dist.values())  totalDist += v;
  const avg_rhr = rhr_y.length ? Math.round(avg(rhr_y)) : null;
  const latest_vo2 = vo_y.length ? vo_y[vo_y.length-1] : null;
  const fitness_age = _fitnessAge(latest_vo2, A.sex);

  return {
    meta: {
      date_min: A.dmin, date_max: A.dmax, records: A.rec,
      total_steps: Math.round(totalSteps),
      total_distance: Math.round(totalDist * 10) / 10,
      active_days: A.day_steps.size,
      workouts: A.workout_total,
      avg_resting_hr: avg_rhr,
      latest_vo2, fitness_age, sex: A.sex,
      weight_unit: A.weight_unit || "kg",
      sleep_consistency,
    },
    steps_daily: { x: sdays, y: svals, roll },
    monthly_distance: { x: md_x, y: md_y },
    resting_hr: { x: rhr_x, y: rhr_y },
    hrv: { x: hrv_x, y: hrv_y },
    sleep: { x: sl_x, y: sl_y },
    sleep_stages: hasStages ? { x: sl_x, core: st_core, deep: st_deep, rem: st_rem, unspec: st_unspec }
                            : { x: [], core: [], deep: [], rem: [], unspec: [] },
    sleep_clock: { x: sl_x, on: clk_on, wk: clk_wk },
    workouts_month: { x: wm_x, y: wm_y },
    weight: { x: wt_x, y: wt_y },
    vo2max: { x: vo_x, y: vo_y },
    blood_pressure: { x: bp_x, sys: bp_sys, dia: bp_dia },
    flights_month: { x: fl_x, y: fl_y },
    energy_month: { x: en_x, y: en_y },
  };
}

// Rough fitness-age estimate from VO2max: the age at which average VO2max
// matches this value. Sex-specific normative slope when known. Clamped and
// labelled as an estimate, not a medical value.
function _fitnessAge(vo2, sex){
  if (!(vo2 > 0)) return null;
  let base, rate;
  if (sex === "male"){ base = 48; rate = 0.40; }
  else if (sex === "female"){ base = 42; rate = 0.35; }
  else { base = 45; rate = 0.375; }
  let age = 20 + (base - vo2) / rate;
  return Math.max(18, Math.min(90, Math.round(age)));
}

// Circular standard deviation (minutes) of a list of clock minutes-of-day.
// Clock times wrap at midnight, so we average them as angles.
function _circStdevMin(arr){
  if (!arr || arr.length < 3) return null;
  let sc = 0, ss = 0;
  for (const mn of arr){ const a = mn/1440*2*Math.PI; sc += Math.cos(a); ss += Math.sin(a); }
  const n = arr.length;
  const R = Math.sqrt((sc/n)**2 + (ss/n)**2);
  if (R <= 1e-9) return 720;
  return Math.sqrt(-2*Math.log(R)) * 1440/(2*Math.PI);
}
// Sleep consistency: how regular bed/wake clock times are, mapped to 0–100.
// Lower variability in onset & wake times → higher score.
function _sleepConsistency(onArr, wkArr){
  const so = _circStdevMin(onArr), sw = _circStdevMin(wkArr);
  if (so == null || sw == null) return null;
  const avg = (so + sw) / 2;
  return Math.max(0, Math.min(100, Math.round(100 - avg/1.5)));
}

// ---- GPS route helpers (workout-routes/*.gpx inside export.zip) ----
const MAX_ROUTE_PTS = 300; // decimation target — invisible at map zoom, tiny in memory
const TRKPT_RE = /<trkpt\b[^>]*>/g;
const LAT_RE = /\blat="([-\d.]+)"/;
const LON_RE = /\blon="([-\d.]+)"/;

// Pull [lat, lon] pairs from GPX text (Apple writes lon before lat).
function extractRoutePoints(text){
  const pts = []; let m; TRKPT_RE.lastIndex = 0;
  while ((m = TRKPT_RE.exec(text)) !== null){
    const la = LAT_RE.exec(m[0]), lo = LON_RE.exec(m[0]);
    if (la && lo){
      const lat = +la[1], lon = +lo[1];
      if (!isNaN(lat) && !isNaN(lon)) pts.push([lat, lon]);
    }
  }
  return pts;
}
// Keep at most `max` points, always preserving the first and last.
function decimate(pts, max){
  if (pts.length <= max) return pts;
  const step = Math.ceil(pts.length / max);
  const out = [];
  for (let i = 0; i < pts.length; i += step) out.push(pts[i]);
  const last = pts[pts.length - 1];
  if (out[out.length - 1] !== last) out.push(last);
  return out;
}
// "workout-routes/route_2022-10-13_11.49pm.gpx" -> "2022-10-13 11:49pm"
function routeLabel(fname){
  const base = fname.split("/").pop().replace(/\.gpx$/i, "");
  const m = base.match(/(\d{4}-\d{2}-\d{2})[_ ](\d{1,2}\.\d{2}\s*[ap]m)/i);
  return m ? (m[1] + " " + m[2].toLowerCase().replace(/\s+/g, "")) : base.replace(/^route[_ ]?/i, "");
}
// Sortable key (chronological) derived from the filename.
function routeSortKey(fname){
  const base = fname.split("/").pop();
  const m = base.match(/(\d{4}-\d{2}-\d{2})_(\d{1,2})\.(\d{2})\s*(am|pm)/i);
  if (m){
    let h = +m[2]; const ap = m[4].toLowerCase();
    if (ap === "pm" && h !== 12) h += 12;
    if (ap === "am" && h === 12) h = 0;
    return m[1] + " " + String(h).padStart(2, "0") + ":" + m[3];
  }
  return base;
}

// Stream a File (raw export.xml or export.zip) and aggregate it.
// onProgress(fraction 0..1) is called as bytes are read.
async function parseHealthExport(file, onProgress){
  const sig = new Uint8Array(await file.slice(0, 2).arrayBuffer());
  const isZip = sig[0] === 0x50 && sig[1] === 0x4B; // "PK"
  const A = newAgg();
  const td = new TextDecoder("utf-8");
  let buf = "";

  // Feed decoded text; scan complete tags; keep only the trailing partial.
  function feed(text, last){
    buf += text;
    if (!A.meScanned) scanMe(A, buf);
    if (!last){
      const lastGt = buf.lastIndexOf(">");
      if (lastGt < 0) return;
      const head = buf.slice(0, lastGt + 1);
      buf = buf.slice(lastGt + 1);
      TAG_RE.lastIndex = 0; let m;
      while ((m = TAG_RE.exec(head)) !== null) handleTag(A, m[0]);
    } else {
      TAG_RE.lastIndex = 0; let m;
      while ((m = TAG_RE.exec(buf)) !== null) handleTag(A, m[0]);
      buf = "";
    }
  }

  const total = file.size || 0;
  let read = 0;
  const reader = file.stream().getReader();

  if (isZip){
    if (!window.fflate) throw new Error("FFLATE_MISSING");
    const unzip = new fflate.Unzip();
    unzip.register(fflate.UnzipInflate);
    let picked = false, finished = false, perr = null;
    const routes = [];
    unzip.onfile = (entry) => {
      const lower = entry.name.toLowerCase();
      // Pick the first .xml that is not the CDA file. The main export dwarfs
      // everything else; this also matches localized names like 导出.xml.
      const isXml = lower.endsWith(".xml") && lower.indexOf("cda") === -1;
      if (isXml && !picked){
        picked = true;
        entry.ondata = (err, chunk, final) => {
          if (err){ perr = err; return; }
          feed(td.decode(chunk, { stream: !final }), final);
          if (final) finished = true;
        };
        entry.start();
        return;
      }
      // Collect workout route maps. Each GPX is small; we decode it, extract
      // lat/lon, decimate to a few hundred points, then discard the raw text.
      if (lower.endsWith(".gpx")){
        const dec = new TextDecoder("utf-8");
        let gbuf = "";
        entry.ondata = (err, chunk, final) => {
          if (err){ perr = err; return; }
          gbuf += dec.decode(chunk, { stream: !final });
          if (final){
            const pts = decimate(extractRoutePoints(gbuf), MAX_ROUTE_PTS);
            gbuf = "";
            if (pts.length >= 2){
              routes.push({ name: routeLabel(entry.name), key: routeSortKey(entry.name), pts });
            }
          }
        };
        entry.start();
      }
    };
    while (true){
      const { value, done } = await reader.read();
      if (done){ unzip.push(new Uint8Array(0), true); break; }
      read += value.byteLength;
      unzip.push(value, false);
      if (perr) throw perr;
      if (onProgress && total) onProgress(read / total);
    }
    if (perr) throw perr;
    if (!picked) throw new Error("NO_XML");
    if (!finished) feed("", true);
    routes.sort((a, b) => a.key < b.key ? -1 : a.key > b.key ? 1 : 0);
    const result = finalize(A);
    result.routes = routes;
    return result;
  } else {
    while (true){
      const { value, done } = await reader.read();
      if (done){ feed("", true); break; }
      read += value.byteLength;
      feed(td.decode(value, { stream: true }), false);
      if (onProgress && total) onProgress(read / total);
    }
  }
  const result = finalize(A);
  result.routes = [];
  return result;
}

/* =====================================================================
   period (year) filter — re-slices the aggregated series to one year and
   recomputes the derivable KPIs. Acts purely on the already-parsed data, so
   switching periods is instant and stays fully on-device. "All time" shows
   the full parse (including the total record count, which can't be derived
   from a single year).
   ===================================================================== */
function filterResultByYear(r, year){
  const pick = (s, hasRoll)=>{
    const x=[], y=[], roll=[];
    for (let i=0;i<s.x.length;i++){
      if (String(s.x[i]).slice(0,4) === year){
        x.push(s.x[i]); y.push(s.y[i]); if (hasRoll) roll.push(s.roll[i]);
      }
    }
    return hasRoll ? {x,y,roll} : {x,y};
  };
  const steps = pick(r.steps_daily, true);
  const dist  = pick(r.monthly_distance, false);
  const rhr   = pick(r.resting_hr, false);
  const hrv   = pick(r.hrv, false);
  const sleep = pick(r.sleep, false);
  const wo    = pick(r.workouts_month, false);
  // sleep stages: slice each stage array by night year
  const ss = { x:[], core:[], deep:[], rem:[], unspec:[] };
  if (r.sleep_stages && r.sleep_stages.x.length){
    for (let i=0;i<r.sleep_stages.x.length;i++){
      if (String(r.sleep_stages.x[i]).slice(0,4) === year){
        ss.x.push(r.sleep_stages.x[i]);
        ss.core.push(r.sleep_stages.core[i]);
        ss.deep.push(r.sleep_stages.deep[i]);
        ss.rem.push(r.sleep_stages.rem[i]);
        ss.unspec.push(r.sleep_stages.unspec[i]);
      }
    }
  }
  // sleep clock times for consistency recompute
  const clOn=[], clWk=[];
  if (r.sleep_clock){
    for (let i=0;i<r.sleep_clock.x.length;i++){
      if (String(r.sleep_clock.x[i]).slice(0,4) === year){ clOn.push(r.sleep_clock.on[i]); clWk.push(r.sleep_clock.wk[i]); }
    }
  }
  const weight = r.weight ? pick(r.weight, false) : {x:[],y:[]};
  const vo2max = r.vo2max ? pick(r.vo2max, false) : {x:[],y:[]};
  const flights_month = r.flights_month ? pick(r.flights_month, false) : {x:[],y:[]};
  const energy_month = r.energy_month ? pick(r.energy_month, false) : {x:[],y:[]};
  // blood pressure has paired sys/dia arrays — slice them together by year
  const bp = { x:[], sys:[], dia:[] };
  if (r.blood_pressure){
    for (let i=0;i<r.blood_pressure.x.length;i++){
      if (String(r.blood_pressure.x[i]).slice(0,4) === year){
        bp.x.push(r.blood_pressure.x[i]);
        bp.sys.push(r.blood_pressure.sys[i]);
        bp.dia.push(r.blood_pressure.dia[i]);
      }
    }
  }
  const routes = (r.routes||[]).filter(rt => String(rt.key).slice(0,4) === year);
  const sum = a => a.reduce((p,c)=>p+c,0);
  const dates = steps.x.concat(rhr.x, hrv.x, sleep.x).sort();
  const latest_vo2 = vo2max.y.length ? vo2max.y[vo2max.y.length-1] : null;
  return {
    meta:{
      date_min: dates[0] || (year+"-01-01"),
      date_max: dates[dates.length-1] || (year+"-12-31"),
      records: null,
      total_steps: Math.round(sum(steps.y)),
      total_distance: Math.round(sum(dist.y)*10)/10,
      active_days: steps.y.filter(v=>v>0).length,
      workouts: sum(wo.y),
      avg_resting_hr: rhr.y.length ? Math.round(sum(rhr.y)/rhr.y.length) : null,
      latest_vo2, fitness_age: _fitnessAge(latest_vo2, r.meta.sex), sex: r.meta.sex,
      weight_unit: r.meta.weight_unit || "kg",
      sleep_consistency: _sleepConsistency(clOn, clWk),
    },
    steps_daily: steps, monthly_distance: dist, resting_hr: rhr,
    hrv, sleep, workouts_month: wo, routes,
    sleep_stages: ss, sleep_clock: { x: ss.x.length ? ss.x : sleep.x, on: clOn, wk: clWk },
    weight, vo2max, blood_pressure: bp, flights_month, energy_month,
  };
}

function populatePeriodPicker(r){

/* --- streaks & records --------------------------------------------------
   Personal bests derived from the already-computed daily/monthly series.
   The active-day streak counts consecutive calendar days with steps > 0.
   "Current streak" only shows under All time (it's anchored to the most
   recent recorded day, which a single-year slice would misrepresent).
   ----------------------------------------------------------------------- */
function _dayStr(d){ return d instanceof Date ? d.toISOString().slice(0,10) : String(d); }
function _streaks(days){
  // days: sorted array of "YYYY-MM-DD" strings with activity
  if (!days.length) return { longest:0, current:0, longestEnd:null };
  const ms = d => Date.parse(d + "T00:00:00Z");
  let longest = 1, run = 1, longestEnd = days[0];
  for (let i=1;i<days.length;i++){
    const gap = Math.round((ms(days[i]) - ms(days[i-1])) / 86400000);
    if (gap === 1){ run++; if (run > longest){ longest = run; longestEnd = days[i]; } }
    else if (gap > 1){ run = 1; }
  }
  // current streak: consecutive days ending on the last recorded day
  let current = 1;
  for (let i=days.length-1;i>0;i--){
    const gap = Math.round((ms(days[i]) - ms(days[i-1])) / 86400000);
    if (gap === 1) current++; else break;
  }
  return { longest, current, longestEnd };
}
function _argMax(x, y){
  let bi = -1, bv = -Infinity;
  for (let i=0;i<y.length;i++){ if (y[i] > bv){ bv = y[i]; bi = i; } }
  return bi < 0 ? null : { x: x[bi], v: bv };
}
function _argMin(x, y){
  let bi = -1, bv = Infinity;
  for (let i=0;i<y.length;i++){ if (y[i] < bv){ bv = y[i]; bi = i; } }
  return bi < 0 ? null : { x: x[bi], v: bv };
}

// Compute personal bests as raw structured data, shared by the records panel
// and the AI summary. Returns only the records that have data. "currentStreak"
// is included only when viewing the full timeline (a single-year slice would
// misrepresent a streak anchored to the most recent recorded day).
function computeRecords(r){
  const out = {};
  const sd = r.steps_daily;
  const activeDays = [];
  for (let i=0;i<sd.x.length;i++){ if (sd.y[i] > 0) activeDays.push(sd.x[i]); }

  const bestDay = _argMax(sd.x, sd.y);
  if (bestDay && bestDay.v > 0) out.bestStepDay = { steps: bestDay.v, date: bestDay.x };

  if (activeDays.length){
    const st = _streaks(activeDays);
    if (st.longest > 1) out.longestStreak = { days: st.longest, end: st.longestEnd || "" };
    if (LAST_RESULT === FULL_RESULT && st.current > 1) out.currentStreak = { days: st.current };
  }

  const moSteps = new Map();
  for (let i=0;i<sd.x.length;i++){ const mo = String(sd.x[i]).slice(0,7); moSteps.set(mo, (moSteps.get(mo)||0) + sd.y[i]); }
  if (moSteps.size){
    const mx = [...moSteps.keys()], my = mx.map(k=>moSteps.get(k));
    const best = _argMax(mx, my);
    if (best && best.v > 0) out.bestStepMonth = { steps: Math.round(best.v), month: best.x };
  }

  const bw = _argMax(r.workouts_month.x, r.workouts_month.y);
  if (bw && bw.v > 0) out.busiestWorkoutMonth = { count: bw.v, month: bw.x };

  const bs = _argMax(r.sleep.x, r.sleep.y);
  if (bs && bs.v > 0) out.bestSleep = { hours: Math.round(bs.v*10)/10, date: bs.x };

  const lr = _argMin(r.resting_hr.x, r.resting_hr.y);
  if (lr && isFinite(lr.v)) out.lowestRhr = { bpm: lr.v, date: lr.x };

  if (r.meta && r.meta.sleep_consistency != null) out.sleepConsistency = { score: r.meta.sleep_consistency };

  return out;
}

/* --- patterns / correlations -------------------------------------------
   Pearson correlation between day-aligned metric pairs. Conservative gates
   (>= MIN_DAYS shared days, |r| >= MIN_R) keep findings meaningful and avoid
   over-claiming. Purely derived from the existing daily series; no raw data.
   ----------------------------------------------------------------------- */
const CORR_MIN_DAYS = 30;
const CORR_MIN_R = 0.2;
// candidate pairs: [metricKeyA, seriesA, metricKeyB, seriesB] — daily series only
const CORR_PAIRS = [
  ["steps","steps_daily","sleep","sleep"],
  ["steps","steps_daily","rhr","resting_hr"],
  ["steps","steps_daily","hrv","hrv"],
  ["sleep","sleep","rhr","resting_hr"],
  ["sleep","sleep","hrv","hrv"],
  ["rhr","resting_hr","hrv","hrv"],
];
function _seriesToDayMap(s){
  // only daily series (date keys length 10) are usable for day-aligned pairing
  const m = new Map();
  for (let i=0;i<s.x.length;i++){ if (String(s.x[i]).length === 10) m.set(s.x[i], s.y[i]); }
  return m;
}
function _pearson(xs, ys){
  const n = xs.length; if (n < 2) return 0;
  let sx=0, sy=0, sxx=0, syy=0, sxy=0;
  for (let i=0;i<n;i++){ const a=xs[i], b=ys[i]; sx+=a; sy+=b; sxx+=a*a; syy+=b*b; sxy+=a*b; }
  const cov = sxy - sx*sy/n;
  const vx = sxx - sx*sx/n, vy = syy - sy*sy/n;
  if (vx <= 0 || vy <= 0) return 0;
  return cov / Math.sqrt(vx*vy);
}
function computeCorrelations(r){
  const found = [];
  const seen = new Set();
  for (const [ka, sa, kb, sb] of CORR_PAIRS){
    const key = [ka,kb].sort().join("|");
    if (seen.has(key)) continue;
    const A = r[sa], B = r[sb];
    if (!A || !B || !A.x || !B.x) continue;
    const mapA = _seriesToDayMap(A), mapB = _seriesToDayMap(B);
    if (!mapA.size || !mapB.size) continue;
    const xs = [], ys = [];
    for (const [day, va] of mapA){ if (mapB.has(day)){ xs.push(va); ys.push(mapB.get(day)); } }
    if (xs.length < CORR_MIN_DAYS) continue;
    const r0 = _pearson(xs, ys);
    if (Math.abs(r0) < CORR_MIN_R) continue;
    seen.add(key);
    found.push({ a:ka, b:kb, r:r0, n:xs.length, xs, ys });
  }
  found.sort((p,q)=> Math.abs(q.r) - Math.abs(p.r));
  return found;
}

function renderCorrelations(r){
  const sec = document.getElementById("patternsSec");
  const list = document.getElementById("corrList");
  const chartCard = document.getElementById("corrChartCard");
  const found = computeCorrelations(r);
  if (!found.length){ sec.style.display = "none"; return; }
  sec.style.display = "";

  list.innerHTML = found.map(f=>{
    const a = t("corr.m."+f.a), b = t("corr.m."+f.b);
    const dir = f.r >= 0 ? t("corr.higher") : t("corr.lower");
    const sentence = tf("corr.sentence", {a, b, dir});
    const pct = Math.round(Math.abs(f.r)*100);
    return `<div class="corr">
      <div class="corr-text">${sentence}</div>
      <div class="corr-meta">
        <span class="corr-bar"><i style="width:${pct}%"></i></span>
        <span class="corr-r">r = ${(f.r>=0?"+":"")}${f.r.toFixed(2)}</span>
      </div>
      <div class="corr-meta">${tf("corr.meta",{n:fmtInt(f.n)})}</div>
    </div>`;
  }).join("");

  // scatter for the single strongest pair
  const top = found[0];
  if (window.Plotly && top){
    const a = t("corr.m."+top.a), b = t("corr.m."+top.b);
    document.getElementById("corrChartSub").textContent = tf("corr.chartSub", {a, b});
    chartCard.style.display = "";
    const lay = baseLayout(b);
    lay.hovermode = "closest";
    lay.xaxis.title = {text:a, font:{size:12}};
    Plotly.newPlot("corrChart", [{
      type:"scattergl", mode:"markers", x:top.xs, y:top.ys,
      marker:{color:"rgba(250,60,76,0.45)", size:6},
      hovertemplate:"%{x}<br>%{y}<extra></extra>",
    }], lay, PLOT_CFG);
  } else {
    chartCard.style.display = "none";
  }
}

function card(id, titleKey, subKey, insightId){
  return `<div class="card"><h3>${t(titleKey)}</h3><p class="csub">${t(subKey)}</p><div class="plotwrap" id="${id}"></div><p class="insight" id="${insightId}"></p></div>`;

/* --- per-chart interpretation ------------------------------------- */
function _mean(a){ return a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0; }
function tf(key, vars){
  let s = t(key);
  for (const k in vars){ s = s.split("{"+k+"}").join(vars[k]); }
  return s;
}
function _trendDir(recent, earlier){
  const d = recent - earlier;
  const thr = Math.max(1, Math.abs(earlier) * 0.02);
  return d > thr ? "ins.up" : (d < -thr ? "ins.down" : "ins.flat");
}
function fillInsight(id, text){
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

/* --- weekly rhythm: average steps by day of week --------------------------
   Derived from the daily step series. Monday-first labels. Returns null when
   there isn't enough data to be meaningful.
   ------------------------------------------------------------------------- */
const WEEKDAY_KEYS = ["wk.mon","wk.tue","wk.wed","wk.thu","wk.fri","wk.sat","wk.sun"];
function computeWeekday(r){
  const sd = r.steps_daily;
  if (!sd || !sd.x.length) return null;
  const sum = [0,0,0,0,0,0,0], cnt = [0,0,0,0,0,0,0];
  for (let i=0;i<sd.x.length;i++){
    const d = String(sd.x[i]); if (d.length !== 10) continue;
    // Monday-first index: JS getUTCDay() is 0=Sun..6=Sat
    const js = new Date(d + "T00:00:00Z").getUTCDay();
    const idx = (js + 6) % 7;
    sum[idx] += sd.y[i]; cnt[idx]++;
  }
  const total = cnt.reduce((a,b)=>a+b,0);
  if (total < 14) return null; // need at least a couple of weeks
  const avg = sum.map((s,i)=> cnt[i] ? s/cnt[i] : 0);
  let maxIdx = 0, minIdx = 0;
  for (let i=1;i<7;i++){
    if (avg[i] > avg[maxIdx]) maxIdx = i;
    if (cnt[i] && (avg[i] < avg[minIdx] || !cnt[minIdx])) minIdx = i;
  }
  return { avg, cnt, maxIdx, minIdx };
}

    const meanS = Math.round(_mean(bp.sys)), meanD = Math.round(_mean(bp.dia));
    fillInsight("i_bp", tf("ins.bp", {sys:meanS, dia:meanD}));
  }
  if (r.flights_month && r.flights_month.x.length){
    Plotly.newPlot("c_fl", [
