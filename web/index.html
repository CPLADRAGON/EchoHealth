/* =====================================================================
   shareable report export (PNG / PDF) — fully client-side

   Composes one tall canvas: header, KPI grid, each chart rendered to an
   image via Plotly.toImage, the matching insight text, and a footer.
   PNG downloads directly; PDF lazy-loads jsPDF and embeds the same canvas.
   The routes map is intentionally excluded (cross-origin OSM tiles would
   taint the canvas and block export).
   ===================================================================== */
const JSPDF_JS = "https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js";
let _jspdfReady = null;
function loadJsPdf(){
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if (_jspdfReady) return _jspdfReady;
  _jspdfReady = new Promise((resolve, reject)=>{
    const js = document.createElement("script");
    js.src = JSPDF_JS;
    js.onload = ()=>resolve();
    js.onerror = ()=>reject(new Error("JSPDF_LOAD"));
    document.head.appendChild(js);
  });
  return _jspdfReady;
}

const CHART_EXPORT = [
  ["c_steps","i_steps"], ["c_dist","i_dist"], ["c_rhr","i_rhr"],
  ["c_hrv","i_hrv"], ["c_sleep","i_sleep"], ["c_slst","i_slst"], ["c_wo","i_wo"],
  ["c_wk","i_wk"], ["c_wt","i_wt"], ["c_vo2","i_vo2"],
  ["c_bp","i_bp"], ["c_fl","i_fl"], ["c_en","i_en"],
];

function _wrapText(ctx, text, maxW){
  const words = String(text||"").split(/\s+/).filter(Boolean);
  const lines = []; let line = "";
  for (const w of words){
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxW && line){ lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}
function _roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function _fit(ctx, text, maxW){
  let s = String(text);
  if (ctx.measureText(s).width <= maxW) return s;
  while (s.length > 1 && ctx.measureText(s+"…").width > maxW) s = s.slice(0,-1);
  return s + "…";
}

async function buildReportCanvas(){
  const r = LAST_RESULT, m = r.meta;
  // Smaller scale on phones keeps the canvas area under iOS Safari's limit.
  const SC = (window.matchMedia && window.matchMedia("(max-width:700px)").matches) ? 1.5 : 2;
  const W = 1200, PAD = 56, CW = W - PAD*2;
  const FAM = '-apple-system, "Segoe UI", Roboto, sans-serif';
  const ink = "#1d1d1f", muted = "#6e6e73", hair = "rgba(0,0,0,.10)";

  // 1) pre-render every present chart to an image at export resolution
  const charts = [];
  for (const [cid, iid] of CHART_EXPORT){
    const gd = document.getElementById(cid);
    if (!gd || !gd._fullLayout) continue;
    const cardEl = gd.closest(".card");
    const titleEl = cardEl && cardEl.querySelector("h3");
    const insEl = document.getElementById(iid);
    const dataUrl = await Plotly.toImage(gd, {format:"png", width:CW, height:320, scale:SC});
    const img = await new Promise((res,rej)=>{ const im = new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=dataUrl; });
    charts.push({ title: titleEl ? titleEl.textContent : "", insight: insEl ? insEl.textContent.trim() : "", img });
  }

  // 2) measuring pass → total height
  const meas = document.createElement("canvas").getContext("2d");
  const kpis = [
    [t("kpi.dateRange"), (m.date_min||"—")+"  →  "+(m.date_max||"—")],
    [t("kpi.totalSteps"), fmtInt(m.total_steps)],
    [t("kpi.totalDistance"), fmtInt(Math.round(m.total_distance))+" "+t("kpi.km")],
    [t("kpi.activeDays"), fmtInt(m.active_days)],
    [t("kpi.workouts"), fmtInt(m.workouts)],
    [t("kpi.avgRestingHr"), (m.avg_resting_hr==null?"—":fmtInt(m.avg_resting_hr)+" "+t("kpi.bpm"))],
    [t("kpi.records"), fmtInt(m.records)],
  ];
  const COLS = 3, GAP = 16, cardW = (CW - GAP*(COLS-1))/COLS, cardH = 92;
  const kpiRows = Math.ceil(kpis.length/COLS);
  const kpiBlockH = kpiRows*cardH + (kpiRows-1)*GAP;

  meas.font = "15px " + FAM;
  charts.forEach(c=>{ c._lines = _wrapText(meas, c.insight, CW); });
  meas.font = "13px " + FAM;
  const discLines = _wrapText(meas, t("report.disclaimer"), CW);

  const headerH = 150;
  let total = PAD + headerH + 28 + kpiBlockH + 36;
  charts.forEach(c=>{ total += 30 + 320 + (c._lines.length ? 10 + c._lines.length*22 : 0) + 28; });
  total += 16 + discLines.length*20 + PAD;

  // 3) draw onto the real canvas
  const cv = document.createElement("canvas");
  cv.width = Math.round(W*SC); cv.height = Math.round(total*SC);
  const ctx = cv.getContext("2d");
  ctx.scale(SC, SC);
  ctx.textBaseline = "top";
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,W,total);

  let y = PAD;
  ctx.fillStyle = ink; ctx.font = "600 40px " + FAM;
  ctx.fillText(t("app.title"), PAD, y); y += 50;
  ctx.fillStyle = muted; ctx.font = "18px " + FAM;
  ctx.fillText(t("report.heading") + " · " + (m.date_min||"") + "  →  " + (m.date_max||""), PAD, y); y += 26;
  const gdate = new Date().toLocaleDateString(LANG==="zh"?"zh-CN":"en-US", {year:"numeric",month:"long",day:"numeric"});
  ctx.font = "14px " + FAM;
  ctx.fillText(tf("report.generated",{date:gdate}), PAD, y); y += 30;
  ctx.strokeStyle = hair; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, y+0.5); ctx.lineTo(W-PAD, y+0.5); ctx.stroke(); y += 28;

  kpis.forEach((kp, i)=>{
    const col = i % COLS, row = Math.floor(i/COLS);
    const x = PAD + col*(cardW+GAP);
    const cy = y + row*(cardH+GAP);
    ctx.fillStyle = "#f5f5f7";
    _roundRect(ctx, x, cy, cardW, cardH, 14); ctx.fill();
    ctx.fillStyle = muted; ctx.font = "13px " + FAM;
    ctx.fillText(_fit(ctx, kp[0], cardW-32), x+16, cy+16);
    ctx.fillStyle = ink; ctx.font = "600 24px " + FAM;
    ctx.fillText(_fit(ctx, kp[1], cardW-32), x+16, cy+42);
  });
  y += kpiBlockH + 36;

  for (const c of charts){
    ctx.fillStyle = ink; ctx.font = "600 20px " + FAM;
    ctx.fillText(c.title, PAD, y); y += 30;
    ctx.drawImage(c.img, PAD, y, CW, 320); y += 320;
    if (c._lines.length){
      y += 10; ctx.fillStyle = muted; ctx.font = "15px " + FAM;
      c._lines.forEach(ln=>{ ctx.fillText(ln, PAD, y); y += 22; });
    }
    y += 28;
  }

  y += 16; ctx.fillStyle = muted; ctx.font = "13px " + FAM;
  discLines.forEach(ln=>{ ctx.fillText(ln, PAD, y); y += 20; });

  return cv;
}

/* --- year-in-review share card (portrait 9:16, story-shaped) ----------
   A single bold image summarising the period currently in view. Built on a
   fixed 1080×1920 canvas (well under iOS Safari's canvas limit) so it shares
   cleanly to stories/messages. Routed through the same preview modal.
   -------------------------------------------------------------------- */
function _minMax(a){ let lo=Infinity, hi=-Infinity; for (const v of a){ if(v<lo)lo=v; if(v>hi)hi=v; } return [lo,hi]; }

// Smooth area sparkline (used for the rolling-steps trend inside the hero).
function _sparkline(ctx, vals, x, y, w, h, lineColor, fillColor){
  const n = vals.length; if (n < 2) return;
  let [lo, hi] = _minMax(vals); if (hi === lo) hi = lo + 1;
  const px = i => x + (i/(n-1))*w;
  const py = v => y + h - ((v-lo)/(hi-lo))*h;
  ctx.beginPath(); ctx.moveTo(px(0), py(vals[0]));
  for (let i=1;i<n;i++) ctx.lineTo(px(i), py(vals[i]));
  ctx.lineTo(px(n-1), y+h); ctx.lineTo(px(0), y+h); ctx.closePath();
  ctx.fillStyle = fillColor; ctx.fill();
  ctx.beginPath(); ctx.moveTo(px(0), py(vals[0]));
  for (let i=1;i<n;i++) ctx.lineTo(px(i), py(vals[i]));
  ctx.strokeStyle = lineColor; ctx.lineWidth = 4; ctx.lineJoin = "round"; ctx.stroke();
}

// Compact bar strip (used for distance-by-month seasonality).
function _miniBars(ctx, vals, x, y, w, h, color){
  const n = vals.length; if (!n) return;
  const [, hi] = _minMax(vals); const top = hi > 0 ? hi : 1;
  const gap = n > 24 ? 2 : (n > 12 ? 4 : 8);
  const bw = (w - gap*(n-1))/n;
  for (let i=0;i<n;i++){
    const bh = Math.max(3, (vals[i]/top)*h);
    _roundRect(ctx, x + i*(bw+gap), y + h - bh, bw, bh, Math.min(6, bw/2));
    ctx.fillStyle = color; ctx.fill();
  }
}

// Approximate path length of a [[lat,lon],...] track, in km (haversine).
function _routePathKm(pts){
  let km = 0;
  for (let i=1;i<pts.length;i++){
    const [la1,lo1] = pts[i-1], [la2,lo2] = pts[i];
    const dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
    const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
    km += 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  return km;
}
// Pick the longest-distance route in the set (the run worth showing off).
function _pickHeroRoute(routes){
  let best = null, bestKm = 0;
  for (const rt of routes){
    if (!rt.pts || rt.pts.length < 2) continue;
    const km = _routePathKm(rt.pts);
    if (km > bestKm){ bestKm = km; best = rt; }
  }
  return best ? { route: best, km: bestKm } : null;
}
// Draw a route outline, equirectangular projection, aspect-fit & centred in box.
function _drawRouteOutline(ctx, pts, x, y, w, h, color){
  const latR = pts.map(p=>p[0]), lonR = pts.map(p=>p[1]);
  const [laMin, laMax] = _minMax(latR), [loMin, loMax] = _minMax(lonR);
  const midLat = (laMin+laMax)/2 * Math.PI/180;
  // longitude degrees are narrower than latitude away from the equator
  const sx = Math.cos(midLat);
  const gw = Math.max(1e-6, (loMax-loMin)*sx), gh = Math.max(1e-6, (laMax-laMin));
  const pad = 14;
  const scale = Math.min((w-pad*2)/gw, (h-pad*2)/gh);
  const offX = x + (w - gw*scale)/2, offY = y + (h - gh*scale)/2;
  const px = lo => offX + (lo-loMin)*sx*scale;
  const py = la => offY + (laMax-la)*scale; // north up
  ctx.beginPath();
  ctx.moveTo(px(pts[0][1]), py(pts[0][0]));
  for (let i=1;i<pts.length;i++) ctx.lineTo(px(pts[i][1]), py(pts[i][0]));
  ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.stroke();
  // start/end dots
  ctx.fillStyle = "#34c759"; ctx.beginPath(); ctx.arc(px(pts[0][1]), py(pts[0][0]), 9, 0, 7); ctx.fill();
  const e = pts[pts.length-1];
  ctx.fillStyle = "#fa3c4c"; ctx.beginPath(); ctx.arc(px(e[1]), py(e[0]), 9, 0, 7); ctx.fill();
}

function _cardPeriodTitle(r){
  const sel = document.getElementById("periodPick");
  const yr = sel ? sel.value : "all";
  if (yr && yr !== "all") return tf("card.yearReview", {year: yr});
  const y0 = String(r.meta.date_min||"").slice(0,4);
  const y1 = String(r.meta.date_max||"").slice(0,4);
  if (y0 && y0 === y1) return tf("card.yearReview", {year: y0});
  return t("card.allTime");
}

function buildShareCard(){
  const r = LAST_RESULT, m = r.meta;
  const W = 1080, H = 1920, PAD = 90, CW = W - PAD*2;
  const FAM = '-apple-system, "Segoe UI", Roboto, sans-serif';
  const ink = "#1d1d1f", muted = "#6e6e73", accent = "#fa3c4c";

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  ctx.textBaseline = "top";

  // soft background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, "#fff6f6"); bg.addColorStop(0.5, "#ffffff"); bg.addColorStop(1, "#f5f5f7");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // header
  let y = 150;
  ctx.textAlign = "left";
  ctx.fillStyle = accent; ctx.font = "700 30px " + FAM;
  ctx.fillText("ECHOHEALTH", PAD, y); y += 46;
  ctx.fillStyle = ink; ctx.font = "700 76px " + FAM;
  ctx.fillText(_fit(ctx, _cardPeriodTitle(r), CW), PAD, y); y += 92;
  ctx.fillStyle = muted; ctx.font = "34px " + FAM;
  ctx.fillText((m.date_min||"") + "  →  " + (m.date_max||""), PAD, y); y += 70;

  // hero: total steps, accent panel, with a rolling-steps sparkline beneath
  const heroH = 340;
  const hg = ctx.createLinearGradient(PAD, y, PAD+CW, y+heroH);
  hg.addColorStop(0, "#fa3c4c"); hg.addColorStop(1, "#ff7a52");
  _roundRect(ctx, PAD, y, CW, heroH, 28); ctx.fillStyle = hg; ctx.fill();
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,255,255,.85)"; ctx.font = "600 34px " + FAM;
  ctx.fillText(t("card.totalSteps").toUpperCase(), W/2, y+44);
  ctx.fillStyle = "#fff"; ctx.font = "700 128px " + FAM;
  ctx.fillText(_fit(ctx, fmtInt(m.total_steps), CW-80), W/2, y+92);
  // sparkline of the 30-day rolling step average (falls back to daily)
  const spark = (r.steps_daily.roll && r.steps_daily.roll.length>1) ? r.steps_daily.roll : r.steps_daily.y;
  _sparkline(ctx, spark, PAD+40, y+236, CW-80, 86,
    "rgba(255,255,255,.95)", "rgba(255,255,255,.20)");
  y += heroH + 36;

  // 2×2 stat tiles
  const tiles = [
    [t("card.distance"), fmtInt(Math.round(m.total_distance)) + " " + t("kpi.km")],
    [t("card.workouts"), fmtInt(m.workouts)],
    [t("card.activeDays"), fmtInt(m.active_days)],
    [t("card.restingHr"), (m.avg_resting_hr==null ? "—" : fmtInt(m.avg_resting_hr) + " " + t("kpi.bpm"))],
  ];
  const GAP = 30, tw = (CW - GAP)/2, th = 210;
  tiles.forEach((tl, i)=>{
    const col = i % 2, row = Math.floor(i/2);
    const x = PAD + col*(tw+GAP), ty = y + row*(th+GAP);
    _roundRect(ctx, x, ty, tw, th, 24); ctx.fillStyle = "#ffffff"; ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.07)"; ctx.lineWidth = 1; ctx.stroke();
    ctx.textAlign = "left";
    ctx.fillStyle = muted; ctx.font = "30px " + FAM;
    ctx.fillText(_fit(ctx, tl[0], tw-64), x+34, ty+36);
    ctx.fillStyle = ink; ctx.font = "700 60px " + FAM;
    ctx.fillText(_fit(ctx, tl[1], tw-64), x+34, ty+88);
  });
  y += th*2 + GAP + 36;

  // distance-by-month bars (seasonality at a glance)
  const dm = r.monthly_distance;
  if (dm.y && dm.y.length){
    ctx.textAlign = "left";
    ctx.fillStyle = ink; ctx.font = "600 32px " + FAM;
    ctx.fillText(t("chart.dist.title"), PAD, y); y += 44;
    _miniBars(ctx, dm.y, PAD, y, CW, 150, accent);
    y += 150 + 36;
  }

  // bottom panel: best step day, paired with a route outline when available
  const sy = r.steps_daily.y, sx = r.steps_daily.x;
  let bestVal = 0, bestDay = "";
  for (let i=0;i<sy.length;i++){ if (sy[i] > bestVal){ bestVal = sy[i]; bestDay = sx[i]; } }
  const hero = _pickHeroRoute(r.routes || []);

  if (hero){
    // two-column dark panel: stats left, route sketch right
    const bh = 300;
    _roundRect(ctx, PAD, y, CW, bh, 24); ctx.fillStyle = "#1d1d1f"; ctx.fill();
    const colW = CW*0.46;
    ctx.textAlign = "left";
    if (bestVal > 0){
      ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.font = "600 26px " + FAM;
      ctx.fillText(t("card.bestDay").toUpperCase(), PAD+34, y+34);
      ctx.fillStyle = "#fff"; ctx.font = "700 44px " + FAM;
      ctx.fillText(_fit(ctx, fmtInt(bestVal), colW-34), PAD+34, y+74);
      ctx.fillStyle = "rgba(255,255,255,.7)"; ctx.font = "26px " + FAM;
      ctx.fillText(_fit(ctx, t("card.steps") + " · " + bestDay, colW-34), PAD+34, y+128);
    }
    ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.font = "600 26px " + FAM;
    ctx.fillText(t("card.longestRoute").toUpperCase(), PAD+34, y+186);
    ctx.fillStyle = "#fff"; ctx.font = "700 40px " + FAM;
    ctx.fillText(_fit(ctx, (Math.round(hero.km*10)/10) + " " + t("kpi.km"), colW-34), PAD+34, y+222);
    // outline in the right column
    _drawRouteOutline(ctx, hero.route.pts, PAD+colW+20, y+30, CW-colW-54, bh-60, "#ff7a52");
    y += bh + 36;
  } else if (bestVal > 0){
    const bh = 170;
    _roundRect(ctx, PAD, y, CW, bh, 24); ctx.fillStyle = "#1d1d1f"; ctx.fill();
    ctx.textAlign = "left";
    ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.font = "600 28px " + FAM;
    ctx.fillText(t("card.bestDay").toUpperCase(), PAD+34, y+34);
    ctx.fillStyle = "#fff"; ctx.font = "700 50px " + FAM;
    ctx.fillText(_fit(ctx, tf("card.bestDaySteps", {steps: fmtInt(bestVal), day: bestDay}), CW-68), PAD+34, y+82);
    y += bh + 36;
  }

  // footer pinned to bottom
  ctx.textAlign = "center";
  ctx.fillStyle = muted; ctx.font = "28px " + FAM;
  ctx.fillText(_fit(ctx, t("card.footer"), CW), W/2, H - 120);
  const gdate = new Date().toLocaleDateString(LANG==="zh"?"zh-CN":"en-US", {year:"numeric",month:"long",day:"numeric"});
  ctx.fillStyle = "#b0b4ba"; ctx.font = "24px " + FAM;
  ctx.fillText(tf("report.generated", {date: gdate}), W/2, H - 82);

  return cv;
}

function _reportName(ext){
  return "echohealth-report-" + new Date().toISOString().slice(0,10) + "." + ext;
}
function _cardName(){
  const sel = document.getElementById("periodPick");
  const yr = sel && sel.value && sel.value !== "all" ? sel.value : new Date().toISOString().slice(0,10);
  return "echohealth-recap-" + yr + ".png";
}
function _download(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
async function withReportBusy(btn, fn){
  if (!LAST_RESULT) return;
  const all = document.querySelectorAll(".exp-btn");
  const label = btn.textContent;
  all.forEach(b=>b.disabled=true);
  btn.textContent = t("report.generating");
  try{ await fn(); }
  catch(e){ console.error(e); showError(t("report.failed")); }
  finally{ all.forEach(b=>b.disabled=false); btn.textContent = label; }
}

/* --- report preview modal --------------------------------------------
   On iOS Safari the <a download> trick is ignored and navigates away from
   the page, leaving the bare image full-screen with no way back. So instead
   of a blind download we always show the report in an in-page dialog with an
   explicit Close (× / Esc / tap-outside) and a Save button. On mobile we also
   surface the native "press and hold to save to Photos" gesture, which is the
   only reliable save path there.
   -------------------------------------------------------------------- */
const pvOverlay = document.getElementById("pvOverlay");
let _pvLastFocus = null, _pvSaveFn = null, _pvUrl = null;
const _isTouch = (window.matchMedia && window.matchMedia("(pointer:coarse)").matches);

function openPreview(blobUrl, saveFn, portrait){
  _pvLastFocus = document.activeElement;
  _pvSaveFn = saveFn;
  const body = document.getElementById("pvBody");
  body.innerHTML = "";
  const img = new Image();
  img.src = blobUrl;
  img.alt = t("report.previewTitle");
  if (portrait){
    // tall story card: fit by height, centred, so it isn't a giant scroll
    img.style.width = "auto";
    img.style.maxWidth = "100%";
    img.style.maxHeight = "70vh";
    img.style.margin = "0 auto";
  }
  body.appendChild(img);
  body.scrollTop = 0;
  document.getElementById("pvHint").textContent = _isTouch ? t("report.hintMobile") : t("report.hintDesktop");
  pvOverlay.classList.add("show");
  document.getElementById("pvSave").focus();
}
function closePreview(){
  pvOverlay.classList.remove("show");
  if (_pvUrl){ URL.revokeObjectURL(_pvUrl); _pvUrl = null; }
  _pvSaveFn = null;
  if (_pvLastFocus && _pvLastFocus.focus) _pvLastFocus.focus();
}
document.getElementById("pvClose").addEventListener("click", closePreview);
pvOverlay.addEventListener("click", e=>{ if(e.target===pvOverlay) closePreview(); });
document.getElementById("pvSave").addEventListener("click", ()=>{ if(_pvSaveFn) _pvSaveFn(); });
document.addEventListener("keydown", e=>{
  if (e.key === "Escape" && pvOverlay.classList.contains("show")) closePreview();
});

(function initReport(){
  const card = document.getElementById("saveCard");
  const png = document.getElementById("savePng");
  const pdf = document.getElementById("savePdf");

  card.addEventListener("click", ()=> withReportBusy(card, async ()=>{
    const cv = buildShareCard();
    const blob = await new Promise(res=>cv.toBlob(res, "image/png"));
    if (_pvUrl) URL.revokeObjectURL(_pvUrl);
    _pvUrl = URL.createObjectURL(blob);
    document.getElementById("pvSave").textContent = t("report.save");
    openPreview(_pvUrl, ()=> _download(blob, _cardName()), true);
  }));

  png.addEventListener("click", ()=> withReportBusy(png, async ()=>{
    const cv = await buildReportCanvas();
    const blob = await new Promise(res=>cv.toBlob(res, "image/png"));
    if (_pvUrl) URL.revokeObjectURL(_pvUrl);
    _pvUrl = URL.createObjectURL(blob);
    document.getElementById("pvSave").textContent = t("report.save");
    openPreview(_pvUrl, ()=> _download(blob, _reportName("png")));
  }));

  pdf.addEventListener("click", ()=> withReportBusy(pdf, async ()=>{
    const cv = await buildReportCanvas();
    // Show a preview using the same canvas, save as PDF on demand.
    if (_pvUrl) URL.revokeObjectURL(_pvUrl);
    _pvUrl = cv.toDataURL("image/png");
    document.getElementById("pvSave").textContent = t("report.savePdfAction");
    openPreview(_pvUrl, async ()=>{
      await loadJsPdf();
      const { jsPDF } = window.jspdf;
      const wpt = cv.width/2, hpt = cv.height/2;
      const doc = new jsPDF({orientation: wpt>hpt?"l":"p", unit:"pt", format:[wpt, hpt]});
      doc.addImage(cv.toDataURL("image/jpeg",0.92), "JPEG", 0, 0, wpt, hpt);
      doc.save(_reportName("pdf"));
    });
  }));
})();

/* =====================================================================
   routes map (lazy-loaded Leaflet + OpenStreetMap tiles)

   All 172 routes are decimated to a few hundred points each during parsing
   (~0.6 MB of coordinates total), drawn together on a single canvas-rendered
   map. A picker highlights and zooms a single run. Leaflet itself (~42 KB) is
   only fetched the first time a file with routes is shown, so it never weighs
   on the initial page load.
   ===================================================================== */
const PLOTLY_JS = "https://cdn.plot.ly/plotly-2.35.2.min.js";
let _plotlyReady = null;
function loadPlotly(){
  if (window.Plotly) return Promise.resolve();
  if (_plotlyReady) return _plotlyReady;
  _plotlyReady = new Promise((resolve, reject)=>{
    const js = document.createElement("script");
    js.src = PLOTLY_JS;
    js.charset = "utf-8";
    js.onload = ()=>resolve();
    js.onerror = ()=>reject(new Error("PLOTLY_LOAD"));
    document.head.appendChild(js);
  });
  return _plotlyReady;
}

const LEAFLET_JS  = "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js";
const LEAFLET_CSS = "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css";
let _leafletReady = null;
function loadLeaflet(){
  if (window.L) return Promise.resolve();
  if (_leafletReady) return _leafletReady;
  _leafletReady = new Promise((resolve, reject)=>{
    const css = document.createElement("link");
    css.rel = "stylesheet"; css.href = LEAFLET_CSS;
    document.head.appendChild(css);
    const js = document.createElement("script");
    js.src = LEAFLET_JS;
    js.onload = ()=>resolve();
    js.onerror = ()=>reject(new Error("LEAFLET_LOAD"));
    document.head.appendChild(js);
  });
  return _leafletReady;
}

let _map = null, _routeLayers = [], _allBounds = null;
const ROUTE_DIM = "rgba(250,60,76,0.35)";   // faint accent for the full overlay
const ROUTE_HI  = "#fa3c4c";                 // bright accent for the selected run

function renderRoutes(r){
  const sec = document.getElementById("mapSec");
  const mapEl = document.getElementById("routeMap");
  const hint = document.getElementById("mapHint");
  const pick = document.getElementById("routePick");
  const routes = (r && r.routes) || [];
  sec.style.display = "";

  if (!routes.length){
    // Either the export has no route data at all (.xml upload), or the
    // selected period simply contains no recorded routes.
    mapEl.style.display = "none";
    pick.style.display = "none";
    hint.style.display = "";
    const hasAny = FULL_RESULT && FULL_RESULT.routes && FULL_RESULT.routes.length;
    hint.innerHTML = hasAny ? t("map.noRoutesPeriod") : t("map.noRoutes");
    return;
  }
  hint.style.display = "none";
  mapEl.style.display = "";
  pick.style.display = "";

  // Build the picker: "All routes (N)" + each run, newest first.
  const ordered = routes.slice().reverse();
  pick.innerHTML = "";
  const optAll = document.createElement("option");
  optAll.value = "all";
  optAll.textContent = tf("map.all", {n: routes.length});
  pick.appendChild(optAll);
  ordered.forEach((rt, i)=>{
    const o = document.createElement("option");
    o.value = String(i);
    o.textContent = rt.name;
    pick.appendChild(o);
  });

  loadLeaflet().then(()=>{
    buildMap(mapEl, ordered);
  }).catch(()=>{
    mapEl.style.display = "none";
    pick.style.display = "none";
    hint.style.display = "";
    hint.textContent = t("map.loadError");
  });
}

function buildMap(mapEl, routes){
  if (_map){ _map.remove(); _map = null; }
  _routeLayers = [];
  _map = L.map(mapEl, { preferCanvas: true, scrollWheelZoom: false });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19, attribution: "© OpenStreetMap",
  }).addTo(_map);
  const renderer = L.canvas({ padding: 0.5 });

  let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
  routes.forEach(rt=>{
    const line = L.polyline(rt.pts, {
      renderer, color: ROUTE_DIM, weight: 2, opacity: 1, interactive: false,
    }).addTo(_map);
    _routeLayers.push(line);
    for (const [la, lo] of rt.pts){
      if (la < minLat) minLat = la; if (la > maxLat) maxLat = la;
      if (lo < minLon) minLon = lo; if (lo > maxLon) maxLon = lo;
    }
  });
  _allBounds = L.latLngBounds([[minLat, minLon], [maxLat, maxLon]]);
  _map.fitBounds(_allBounds, { padding: [20, 20] });

  // Leaflet needs a size recalculation once the container is visible.
  setTimeout(()=>{ if (_map) _map.invalidateSize(); }, 60);

  const pick = document.getElementById("routePick");
  pick.onchange = ()=>{
    const v = pick.value;
    if (v === "all"){
      _routeLayers.forEach(l=>l.setStyle({ color: ROUTE_DIM, weight: 2 }));
      _map.fitBounds(_allBounds, { padding: [20, 20] });
    } else {
      const idx = +v;
      _routeLayers.forEach((l, i)=>l.setStyle(
        i === idx ? { color: ROUTE_HI, weight: 4 } : { color: "rgba(180,190,200,0.25)", weight: 1.5 }
      ));
      _routeLayers[idx].bringToFront();
      _map.fitBounds(_routeLayers[idx].getBounds(), { padding: [30, 30] });
    }
  };
}

// Update language-dependent map text without rebuilding the map.
function refreshRouteText(){
  if (!LAST_RESULT) return;
  const routes = LAST_RESULT.routes || [];
  const hint = document.getElementById("mapHint");
  const pick = document.getElementById("routePick");
  if (!routes.length){
    const hasAny = FULL_RESULT && FULL_RESULT.routes && FULL_RESULT.routes.length;
    if (hint) hint.innerHTML = hasAny ? t("map.noRoutesPeriod") : t("map.noRoutes");
    return;
  }
  if (pick && pick.options.length){
    pick.options[0].textContent = tf("map.all", {n: routes.length});
  }
}

/* =====================================================================
   AI assistant
   ===================================================================== */
const AI_HISTORY = [];   // {role:"user"|"model", text}
let AI_BUSY = false;

function buildHealthSummary(){
  if (!LAST_RESULT) return "";
  const m = LAST_RESULT.meta, lines = [];
  lines.push("Date range: " + (m.date_min||"?") + " to " + (m.date_max||"?"));
  if (m.records!=null) lines.push("Total health records: " + m.records);
  if (m.total_steps!=null) lines.push("Total steps: " + m.total_steps);
  if (m.total_distance!=null) lines.push("Total walking+running distance: " + Math.round(m.total_distance) + " km");
  if (m.active_days!=null) lines.push("Active days: " + m.active_days);
  if (m.workouts!=null) lines.push("Workouts logged: " + m.workouts);
  if (m.avg_resting_hr!=null) lines.push("Average resting heart rate: " + m.avg_resting_hr + " bpm");
  if (m.latest_vo2!=null) lines.push("Latest VO2 max: " + m.latest_vo2 + " mL/kg·min" + (m.fitness_age!=null ? " (estimated fitness age " + m.fitness_age + ")" : ""));
  if (LAST_RESULT.weight && LAST_RESULT.weight.y.length){
    const wy = LAST_RESULT.weight.y;
    lines.push("Latest body weight: " + wy[wy.length-1] + " " + (m.weight_unit||"kg"));
  }
  if (LAST_RESULT.blood_pressure && LAST_RESULT.blood_pressure.x.length){
    const bp = LAST_RESULT.blood_pressure;
    const ms = Math.round(bp.sys.reduce((a,b)=>a+b,0)/bp.sys.length);
    const md = Math.round(bp.dia.reduce((a,b)=>a+b,0)/bp.dia.length);
    lines.push("Average blood pressure: " + ms + "/" + md + " mmHg");
  }
  if (LAST_RESULT.flights_month && LAST_RESULT.flights_month.y.length){
    const ft = LAST_RESULT.flights_month.y.reduce((a,b)=>a+b,0);
    lines.push("Total flights of stairs climbed: " + ft);
  }
  if (m.sleep_consistency != null) lines.push("Sleep consistency score: " + m.sleep_consistency + "/100");
  // attach the already-computed per-chart interpretations
  ["i_steps","i_dist","i_rhr","i_hrv","i_sleep","i_wo"].forEach(id=>{
    const el = document.getElementById(id);
    if (el && el.textContent.trim()) lines.push(el.textContent.trim());
  });
  // personal bests (same data shown in the Streaks & records panel)
  const recs = computeRecords(LAST_RESULT);
  if (recs.bestStepDay) lines.push("Best step day: " + recs.bestStepDay.steps + " steps on " + recs.bestStepDay.date);
  if (recs.longestStreak) lines.push("Longest active streak: " + recs.longestStreak.days + " days (ended " + recs.longestStreak.end + ")");
  if (recs.currentStreak) lines.push("Current active streak: " + recs.currentStreak.days + " days");
  if (recs.bestStepMonth) lines.push("Most steps in a month: " + recs.bestStepMonth.steps + " (" + recs.bestStepMonth.month + ")");
  if (recs.busiestWorkoutMonth) lines.push("Most workouts in a month: " + recs.busiestWorkoutMonth.count + " (" + recs.busiestWorkoutMonth.month + ")");
  if (recs.bestSleep) lines.push("Best night's sleep: " + recs.bestSleep.hours + " h on " + recs.bestSleep.date);
  if (recs.lowestRhr) lines.push("Lowest resting heart rate: " + recs.lowestRhr.bpm + " bpm on " + recs.lowestRhr.date);
  // top cross-metric patterns (associations only)
  const corrs = computeCorrelations(LAST_RESULT).slice(0, 3);
  corrs.forEach(f=>{
    lines.push("Pattern: " + f.a + " vs " + f.b + " correlate r=" + f.r.toFixed(2) + " (n=" + f.n + " days)");
  });
  return lines.join("\n");
}

// Minimal, safe Markdown -> HTML for AI replies (escape first, then format).
function mdToHtml(src){
  let s = String(src || "");
  s = s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // code spans
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  // bold then italic
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  // split into lines, group bullet runs into <ul>
  const lines = s.split(/\r?\n/);
  let html = "", inList = false;
  for (let line of lines){
    const m = line.match(/^\s*[-*•]\s+(.*)$/);
    if (m){
      if (!inList){ html += "<ul>"; inList = true; }
      html += "<li>" + m[1] + "</li>";
    } else {
      if (inList){ html += "</ul>"; inList = false; }
      if (line.trim() === ""){ html += "<br>"; }
      else { html += line + "<br>"; }
    }
  }
  if (inList) html += "</ul>";
  return html;
}

function aiAppend(role, text, isErr){
  const log = document.getElementById("aiLog");
  const div = document.createElement("div");
  div.className = "ai-msg " + (role==="user" ? "user" : "bot") + (isErr ? " err" : "");
  if (role === "bot" && !isErr){
    div.innerHTML = mdToHtml(text);
  } else {
    div.textContent = text;
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function renderAiStatic(){
  const log = document.getElementById("aiLog");
  const chips = document.getElementById("aiChips");
  // only seed the welcome line if the conversation hasn't started
  if (AI_HISTORY.length === 0){
    log.innerHTML = "";
    aiAppend("bot", t("ai.welcome"));
  }
  chips.innerHTML = "";
  ["ai.q1","ai.q2","ai.q3","ai.q4"].forEach(k=>{
    const b = document.createElement("button");
    b.className = "ai-chip";
    b.textContent = t(k);
    b.addEventListener("click", ()=>{ if(!AI_BUSY) sendAi(t(k)); });
    chips.appendChild(b);
  });
}

async function sendAi(question){
  question = (question||"").trim();
  if (!question || AI_BUSY || !LAST_RESULT) return;
  AI_BUSY = true;
  const sendBtn = document.getElementById("aiSend");
  const txt = document.getElementById("aiText");
  sendBtn.disabled = true;
  txt.value = "";
  txt.style.height = "auto";

  aiAppend("user", question);
  const thinking = aiAppend("bot", t("ai.sending"));

  try{
    const resp = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        question,
        summary: buildHealthSummary(),
        history: AI_HISTORY.slice(-8),
        lang: LANG,
      }),
    });
    const data = await resp.json().catch(()=>({}));
    if (!resp.ok || !data.reply){
      thinking.classList.add("err");
      thinking.textContent = data.error ? (t("ai.error") + " (" + data.error + ")") : t("ai.error");
    } else {
      thinking.innerHTML = mdToHtml(data.reply);
      AI_HISTORY.push({role:"user", text:question});
      AI_HISTORY.push({role:"model", text:data.reply});
    }
  } catch(e){
    thinking.classList.add("err");
    thinking.textContent = t("ai.error");
  } finally {
    AI_BUSY = false;
    sendBtn.disabled = false;
    document.getElementById("aiLog").scrollTop = 1e9;
  }
}

(function initAi(){
  const txt = document.getElementById("aiText");
  const sendBtn = document.getElementById("aiSend");
  sendBtn.addEventListener("click", ()=> sendAi(txt.value));
  txt.addEventListener("keydown", (e)=>{
    if (e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendAi(txt.value); }
  });
  txt.addEventListener("input", ()=>{
    txt.style.height = "auto";
    txt.style.height = Math.min(140, txt.scrollHeight) + "px";
  });
})();

applyLang();
showInstallBar();
if (!localStorage.getItem("ah_onboarded")) openModal();
